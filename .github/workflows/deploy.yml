name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1 - Checkout code
      - name: Bước 1 - Tải code từ GitHub
        uses: actions/checkout@v3

      # Bước 2 - Login Docker Hub
      - name: Bước 2 - Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Bước 3 - Push MySQL
      - name: Bước 3 - Push MySQL image
        run: |
          docker pull mysql:8.0
          docker tag mysql:8.0 ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-database:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-database:latest

      # Bước 4 - Build & Push Backend
      - name: Bước 4 - Build và Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./nguyentranngochan
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:latest

      # Bước 5 - Build & Push Frontend
      - name: Bước 5 - Build và Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:latest

      # Bước 6 - Deploy Backend
      - name: Triển khai lên DevOps Classroom
        timeout-minutes: 10
        run: |
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend"
          
          HTTP_CODE=$(curl --max-time 300 --connect-timeout 10 \
            -o /tmp/response_body.txt \
            -w "%{http_code}" \
            -X POST "${{ secrets.DEPLOY_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"$REPO\"}")
          
          echo "HTTP: $HTTP_CODE"
          cat /tmp/response_body.txt || echo "(empty)"
          
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi
          echo "✅ Deploy thành công"
