name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1 - Checkout code
      - name: Bước 1 - Tải code từ GitHub
        uses: actions/checkout@v3

      # Bước 2 - Login Docker Hub
      - name: Bước 2 - Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Bước 3 - Push MySQL
      - name: Bước 3 - Push MySQL image
        run: |
          docker pull mysql:8.0
          docker tag mysql:8.0 ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-database:1.1
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-database:1.1

      # Bước 4 - Build & Push Backend
      - name: Bước 4 - Build và Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./nguyentranngochan
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:1.1

      # Bước 5 - Build & Push Frontend
      - name: Bước 5 - Build và Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:1.1

      # Bước 6 - Deploy Backend
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:1.1"
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO")

          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "Webhook HTTP: $CODE"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "❌ Deploy thất bại"
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi

          echo "✅ Deploy thành công"
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
