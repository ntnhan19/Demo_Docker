spring.application.name=nguyentranngochan

# =============================================
# CẤU HÌNH KẾT NỐI SQL SERVER (chạy LOCAL)
# Khi chạy Docker, các giá trị này sẽ bị override bởi docker-compose.yml
# =============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=demo_docker_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=SqlServer@123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =============================================
# CẤU HÌNH JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
